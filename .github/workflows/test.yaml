name: Deploy Chatbot

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "What to deploy?"
        required: true
        default: web
        type: choice
        options:
          - api
          - web
          - both

env:
  AWS_REGION: us-east-1
  STACK_NAME: chatbot-web-stack   # <-- change to your stack name

jobs:

# ======================
# API DEPLOY
# ======================
  deploy-api:
    if: github.event.inputs.deploy_target == 'api' || github.event.inputs.deploy_target == 'both'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SAM Deploy API
        run: |
          sam build
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset


# ======================
# WEB DEPLOY
# ======================
  deploy-web:
    if: github.event.inputs.deploy_target == 'web' || github.event.inputs.deploy_target == 'both'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 🔥 AUTO FETCH OUTPUTS
      - name: Get CloudFormation Outputs
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs[?OutputKey=='WebsiteBucket'].OutputValue" \
            --output text)

          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)

          echo "WEB_BUCKET=$BUCKET" >> $GITHUB_ENV
          echo "CF_DIST_ID=$DIST_ID" >> $GITHUB_ENV

      # Build static site
      - name: Build web
        run: |
          mkdir web-dist
          cp web/index.html web-dist/index.html
          cp web/styles.css web-dist/styles.css

      # Upload automatically
      - name: Upload to S3
        run: |
          aws s3 sync web-dist s3://$WEB_BUCKET --delete

      # Invalidate cache automatically
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CF_DIST_ID \
            --paths "/*"
