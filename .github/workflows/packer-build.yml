name: Packer + Terraform Deployment

on:
  workflow_dispatch:
    inputs:
      ami_version:
        description: "Enter AMI Version (example: v1.0.0)"
        required: true
        default: "v1.0.0"

      action:
        description: "Terraform Action"
        required: true
        default: "apply"
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:

  # ===============================
  # 1️⃣ PACKER JOB (only for apply)
  # ===============================
  packer-build:
    if: github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest

    outputs:
      ami_id: ${{ steps.extract.outputs.ami_id }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-packer@v3

      - run: packer init packer/

      - run: packer validate -var "ami_version=${{ github.event.inputs.ami_version }}" packer/

      - run: packer build -var "ami_version=${{ github.event.inputs.ami_version }}" packer/

      - name: Extract AMI ID
        id: extract
        run: |
          AMI_ID=$(aws ec2 describe-images \
            --owners self \
            --filters "Name=name,Values=custom-ubuntu-${{ github.event.inputs.ami_version }}" \
            --query "Images | sort_by(@, &CreationDate) | [-1].ImageId" \
            --output text)
          echo "ami_id=$AMI_ID" >> $GITHUB_OUTPUT


  # ===============================
  # 2️⃣ TERRAFORM JOB
  # ===============================
  terraform-deploy:
    runs-on: ubuntu-latest

    # 👇 Only depend on packer when APPLY
    needs: [packer-build]
    if: |
      always() &&
      (
        github.event.inputs.action != 'apply' ||
        needs.packer-build.result == 'success'
      )

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan
        working-directory: terraform/

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve \
          -var="ami_id=${{ needs.packer-build.outputs.ami_id }}"
        working-directory: terraform/

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve
        working-directory: terraform/
