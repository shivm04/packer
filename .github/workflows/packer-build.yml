name: Packer + Terraform Deployment

concurrency:
  group: deploy
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      ami_version:
        description: "Enter AMI Version (example: v1.0.0)"
        required: true
        default: "v1.0.0"

      action:
        description: "Terraform Action"
        required: true
        default: "apply"
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:

# ==================================================
# 1️⃣ JOB: BUILD AMI (Only for APPLY)
# ==================================================
  build-ami:
    if: github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest

    outputs:
      ami_id: ${{ steps.get-ami.outputs.ami_id }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Packer
        uses: hashicorp/setup-packer@v3

      # --------------------------
      # Create Temp VPC
      # --------------------------
      - name: Terraform Init (Network)
        working-directory: packer/ami-network
        run: terraform init

      - name: Terraform Apply (Create Temp VPC)
        working-directory: packer/ami-network
        run: terraform apply -auto-approve

      - name: Export VPC & Subnet IDs
        run: |
          echo "VPC_ID=$(terraform -chdir=packer/ami-network output -raw vpc_id)" >> $GITHUB_ENV
          echo "SUBNET_ID=$(terraform -chdir=packer/ami-network output -raw subnet_id)" >> $GITHUB_ENV

      # --------------------------
      # Build AMI
      # --------------------------
      - name: Packer Init
        run: packer init packer/

      - name: Packer Build
        id: packer-build
        run: |
          packer build \
          -var "ami_version=${{ github.event.inputs.ami_version }}" \
          -var "vpc_id=$VPC_ID" \
          -var "subnet_id=$SUBNET_ID" \
          -machine-readable \
          packer/ | tee packer.log

      # Extract AMI ID from Packer log
      - name: Extract AMI ID
        id: get-ami
        run: |
          AMI_ID=$(grep 'artifact,0,id' packer.log | cut -d, -f6 | cut -d: -f2)
          echo "ami_id=$AMI_ID" >> $GITHUB_OUTPUT
          echo "Created AMI: $AMI_ID"

      # --------------------------
      # Destroy Temp VPC
      # --------------------------
      - name: Destroy Temp VPC
        if: always()
        working-directory: packer/ami-network
        run: terraform destroy -auto-approve


# ==================================================
# 2️⃣ JOB: DEPLOY INFRASTRUCTURE
# ==================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [build-ami]
    if: always()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan'
        working-directory: terraform
        run: terraform plan

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
          -var "ami_id=${{ needs.build-ami.outputs.ami_id }}"

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        working-directory: terraform
        run: terraform destroy -auto-approve
